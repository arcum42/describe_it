<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>describe_it</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css?v=20260423m" />
    <script defer src="/static/app.js?v=20260423m"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>
  <body class="bg-stone-950 text-stone-100">
    <div x-data="describeItApp()" x-init="init()" class="min-h-screen">
      <header class="border-b border-stone-800 bg-stone-900/95 backdrop-blur">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
          <div>
            <p class="text-xs uppercase tracking-[0.35em] text-amber-400">describe_it</p>
            <h1 class="text-2xl font-semibold text-stone-50">Dataset Captioning Workbench</h1>
          </div>
          <div class="flex items-center gap-3 text-sm text-stone-400">
            <div>
              <span>Backend:</span>
              <span class="ml-2 rounded-full border border-stone-700 px-3 py-1" x-text="healthLabel"></span>
            </div>
            <button
              @click="uiSection === 'settings' ? openWorkspace() : openSettings()"
              class="flex items-center gap-2 rounded-xl border border-stone-700 px-3 py-2 text-xs uppercase tracking-[0.2em] text-stone-200 transition hover:border-amber-400 hover:text-amber-200"
              :class="uiSection === 'settings' ? 'border-amber-500 text-amber-200' : ''"
              aria-label="Toggle settings view"
              title="Toggle settings view"
            >
              <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 15.5A3.5 3.5 0 1 0 12 8.5A3.5 3.5 0 1 0 12 15.5z" />
                <path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.8-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.2a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.8 1.6 1.6 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.2a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3h0a1.6 1.6 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.2a1.6 1.6 0 0 0 1 1.5h0a1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 0 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8v0a1.6 1.6 0 0 0 1.5 1H21a2 2 0 0 1 0 4h-.2a1.6 1.6 0 0 0-1.5 1z" />
              </svg>
              <span x-text="uiSection === 'settings' ? 'Back' : 'Settings'"></span>
            </button>
          </div>
        </div>
      </header>

      <main class="mx-auto grid max-w-7xl gap-6 px-6 py-6 lg:grid-cols-[280px_minmax(0,1fr)]">
        <aside class="rounded-2xl border border-stone-800 bg-stone-900 p-5 shadow-2xl shadow-black/20">
          <div class="mb-6">
            <h2 class="text-lg font-medium">Projects</h2>
          </div>

          <!-- ── No project open: Create / Open toggle ─────────────────── -->
          <template x-if="!currentProject">
            <div class="space-y-3">
              <!-- Tab switcher -->
              <div class="inline-flex w-full rounded-xl border border-stone-800 bg-stone-950/60 p-1">
                <button
                  @click="sidebarMode = 'create'"
                  class="flex-1 rounded-lg px-3 py-2 text-xs font-medium uppercase tracking-[0.2em] transition"
                  :class="sidebarMode === 'create' ? 'bg-amber-400 text-stone-950' : 'text-stone-300 hover:text-amber-200'"
                >Create</button>
                <button
                  @click="sidebarMode = 'open'"
                  class="flex-1 rounded-lg px-3 py-2 text-xs font-medium uppercase tracking-[0.2em] transition"
                  :class="sidebarMode === 'open' ? 'bg-amber-400 text-stone-950' : 'text-stone-300 hover:text-amber-200'"
                >Open</button>
              </div>

              <!-- Create form -->
              <div x-show="sidebarMode === 'create'" class="space-y-4 rounded-2xl border border-stone-800 bg-stone-950/60 p-4">
                <div>
                  <p class="text-sm font-medium text-stone-200">Create Project</p>
                  <p class="text-xs text-stone-500">Create a per-project SQLite database and add it to the recent list.</p>
                </div>
                <label class="block text-xs uppercase tracking-[0.2em] text-stone-500">
                  Name
                  <input x-model="createForm.name" class="mt-2 w-full rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-sm text-stone-200 focus:border-amber-400 focus:outline-none" placeholder="My Dataset" />
                </label>
                <label class="block text-xs uppercase tracking-[0.2em] text-stone-500">
                  Path
                  <input x-model="createForm.path" class="mt-2 w-full rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-sm text-stone-200 focus:border-amber-400 focus:outline-none" placeholder="projects/my_dataset.db" />
                </label>
                <label class="block text-xs uppercase tracking-[0.2em] text-stone-500">
                  Description
                  <textarea x-model="createForm.description" class="mt-2 min-h-20 w-full rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-sm text-stone-200 focus:border-amber-400 focus:outline-none" placeholder="Optional project description"></textarea>
                </label>
                <button @click="createProject()" :disabled="isSubmitting" class="w-full rounded-xl bg-amber-400 px-4 py-2 text-sm font-medium text-stone-950 transition hover:bg-amber-300 disabled:cursor-not-allowed disabled:opacity-60">
                  Create Project
                </button>
              </div>

              <!-- Open form -->
              <div x-show="sidebarMode === 'open'" class="space-y-4 rounded-2xl border border-stone-800 bg-stone-950/60 p-4">
                <div>
                  <p class="text-sm font-medium text-stone-200">Open Project</p>
                  <p class="text-xs text-stone-500">Open an existing project database, or browse for one below.</p>
                </div>
                <label class="block text-xs uppercase tracking-[0.2em] text-stone-500">
                  Existing DB Path
                  <input x-model="openForm.path" class="mt-2 w-full rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-sm text-stone-200 focus:border-amber-400 focus:outline-none" placeholder="/absolute/path/to/project.db" />
                </label>
                <button @click="openProject()" :disabled="isSubmitting" class="w-full rounded-xl border border-stone-700 px-4 py-2 text-sm font-medium text-stone-200 transition hover:border-amber-400 hover:text-amber-200 disabled:cursor-not-allowed disabled:opacity-60">
                  Open Project
                </button>
              </div>
            </div>
          </template>

          <!-- ── Project open: metadata + switch ───────────────────────── -->
          <template x-if="currentProject">
            <div class="space-y-4 rounded-2xl border border-stone-800 bg-stone-950/60 p-4">
              <div class="flex items-start justify-between gap-3">
                <div>
                  <p class="text-sm font-medium text-stone-200">Current Project</p>
                </div>
                <button @click="closeProject()" class="rounded-xl border border-stone-700 px-3 py-2 text-xs uppercase tracking-[0.2em] text-stone-300 hover:border-amber-400 hover:text-amber-200">
                  Close
                </button>
              </div>
              <div>
                <p class="font-medium text-stone-100" x-text="currentProject.name"></p>
                <p class="mt-1 break-all text-xs text-stone-400" x-text="currentProject.path"></p>
                <p class="mt-3 text-sm text-stone-300" x-text="currentProject.description || 'No description yet.'"></p>
              </div>
              <div class="space-y-3 border-t border-stone-800 pt-4">
                <p class="text-sm font-medium text-stone-200">Edit Metadata</p>
                <label class="block text-xs uppercase tracking-[0.2em] text-stone-500">
                  Name
                  <input x-model="metadataForm.name" class="mt-2 w-full rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-sm text-stone-200 focus:border-amber-400 focus:outline-none" />
                </label>
                <label class="block text-xs uppercase tracking-[0.2em] text-stone-500">
                  Description
                  <textarea x-model="metadataForm.description" class="mt-2 min-h-20 w-full rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-sm text-stone-200 focus:border-amber-400 focus:outline-none"></textarea>
                </label>
                <label class="block text-xs uppercase tracking-[0.2em] text-stone-500">
                  Trigger Word
                  <input x-model="metadataForm.trigger_word" class="mt-2 w-full rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-sm text-stone-200 focus:border-amber-400 focus:outline-none" placeholder="optional_trigger" />
                </label>
                <label class="block text-xs uppercase tracking-[0.2em] text-stone-500">
                  Caption Mode
                  <select x-model="metadataForm.caption_mode" class="mt-2 w-full rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 pr-8 text-sm text-stone-200 focus:border-amber-400 focus:outline-none">
                    <option value="description">Description</option>
                    <option value="tags">Tags</option>
                  </select>
                </label>
                <label class="block text-xs uppercase tracking-[0.2em] text-stone-500">
                  Project Context URL
                  <input x-model="metadataForm.context_url" class="mt-2 w-full rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-sm text-stone-200 focus:border-amber-400 focus:outline-none" placeholder="https://example.com/reference" />
                </label>
                <label class="block text-xs uppercase tracking-[0.2em] text-stone-500">
                  Project Context File Path
                  <input x-model="metadataForm.context_file_path" class="mt-2 w-full rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-sm text-stone-200 focus:border-amber-400 focus:outline-none" placeholder="/absolute/path/to/context.md" />
                </label>
                <button @click="saveMetadata()" :disabled="isSubmitting" class="w-full rounded-xl border border-stone-700 px-4 py-2 text-sm font-medium text-stone-200 transition hover:border-amber-400 hover:text-amber-200 disabled:cursor-not-allowed disabled:opacity-60">
                  Save Metadata
                </button>
              </div>

              <!-- Switch project accordion -->
              <div class="border-t border-stone-800 pt-4">
                <button
                  @click="showOpenProject = !showOpenProject"
                  class="flex w-full items-center justify-between text-xs uppercase tracking-[0.2em] text-stone-400 hover:text-amber-300"
                >
                  Switch Project
                  <svg class="h-3 w-3 transition-transform" :class="showOpenProject ? 'rotate-180' : ''" viewBox="0 0 10 6" fill="currentColor"><path d="M0 0l5 6 5-6z"/></svg>
                </button>
                <div x-show="showOpenProject" class="mt-3 space-y-3">
                  <label class="block text-xs uppercase tracking-[0.2em] text-stone-500">
                    DB Path
                    <input x-model="openForm.path" class="mt-2 w-full rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-sm text-stone-200 focus:border-amber-400 focus:outline-none" placeholder="/absolute/path/to/project.db" />
                  </label>
                  <button @click="openProject()" :disabled="isSubmitting" class="w-full rounded-xl border border-stone-700 px-4 py-2 text-sm font-medium text-stone-200 transition hover:border-amber-400 hover:text-amber-200 disabled:cursor-not-allowed disabled:opacity-60">
                    Open Project
                  </button>
                </div>
              </div>
            </div>
          </template>

          <!-- ── Path browser (collapsible) ────────────────────────────── -->
          <div class="mt-4 rounded-2xl border border-stone-800 bg-stone-950/60 p-4">
            <button
              @click="showBrowser = !showBrowser; showBrowser && loadBrowser(browser.currentPath)"
              class="flex w-full items-center justify-between text-sm font-medium text-stone-200 hover:text-amber-300"
            >
              <span>Browse Filesystem</span>
              <svg class="h-3 w-3 transition-transform" :class="showBrowser ? 'rotate-180' : ''" viewBox="0 0 10 6" fill="currentColor"><path d="M0 0l5 6 5-6z"/></svg>
            </button>
            <div x-show="showBrowser" class="mt-4 space-y-3">
              <div class="flex items-center justify-between gap-2">
                <div class="min-w-0 flex-1 rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-xs text-stone-400 truncate" x-text="browser.currentPath"></div>
                <button @click="loadBrowser(browser.currentPath)" class="shrink-0 rounded-xl border border-stone-700 px-2 py-2 text-[10px] uppercase tracking-[0.2em] text-stone-300 hover:border-amber-400 hover:text-amber-200">
                  ↺
                </button>
              </div>

              <div class="flex flex-wrap gap-2">
                <template x-for="root in browser.roots" :key="root">
                  <button @click="loadBrowser(root)" class="rounded-full border border-stone-700 px-3 py-1 text-xs text-stone-300 hover:border-amber-400 hover:text-amber-200" x-text="root"></button>
                </template>
              </div>

              <div class="flex flex-wrap gap-2">
                <button @click="browser.parentPath && loadBrowser(browser.parentPath)" :disabled="!browser.parentPath" class="rounded-xl border border-stone-700 px-3 py-2 text-xs uppercase tracking-[0.2em] text-stone-300 hover:border-amber-400 hover:text-amber-200 disabled:cursor-not-allowed disabled:opacity-60">
                  ↑ Up
                </button>
                <template x-if="!currentProject">
                  <button @click="chooseCreateDirectory(browser.currentPath)" class="rounded-xl bg-stone-200 px-3 py-2 text-xs uppercase tracking-[0.2em] text-stone-950 hover:bg-stone-100">
                    Use For Create
                  </button>
                </template>
              </div>

              <div class="grid gap-3 md:grid-cols-2">
                <div>
                  <p class="mb-2 text-xs uppercase tracking-[0.2em] text-stone-500">Directories</p>
                  <div class="max-h-48 space-y-2 overflow-auto pr-1">
                    <template x-for="directory in browser.directories" :key="directory.path">
                      <button @click="loadBrowser(directory.path)" class="block w-full rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-left text-sm text-stone-200 hover:border-amber-400/60">
                        <span x-text="directory.name"></span>
                      </button>
                    </template>
                  </div>
                </div>
                <div>
                  <p class="mb-2 text-xs uppercase tracking-[0.2em] text-stone-500">Project DB Files</p>
                  <div class="max-h-48 space-y-2 overflow-auto pr-1">
                    <template x-if="browser.dbFiles.length === 0">
                      <p class="rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-sm text-stone-500">No .db files here.</p>
                    </template>
                    <template x-for="file in browser.dbFiles" :key="file.path">
                      <button @click="chooseOpenFile(file.path)" class="block w-full rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-left text-sm text-stone-200 hover:border-amber-400/60">
                        <span x-text="file.name"></span>
                      </button>
                    </template>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- ── Status / error messages ────────────────────────────────── -->
          <template x-if="statusMessage">
            <p class="mt-4 rounded-xl border border-emerald-900 bg-emerald-950/40 px-4 py-3 text-sm text-emerald-200" x-text="statusMessage"></p>
          </template>
          <template x-if="errorMessage">
            <p class="mt-4 rounded-xl border border-red-900 bg-red-950/40 px-4 py-3 text-sm text-red-200" x-text="errorMessage"></p>
          </template>

          <!-- ── No project placeholder ─────────────────────────────────── -->
          <template x-if="!currentProject">
            <div class="mt-4 rounded-xl border border-stone-800 bg-stone-950/40 px-4 py-3 text-sm text-stone-500">
              Create a new project or open an existing one to start importing and editing images.
            </div>
          </template>

          <!-- ── Recent Projects ─────────────────────────────────────────── -->
          <div class="mt-6 flex items-center justify-between">
            <h3 class="text-sm font-medium text-stone-200">Recent Projects</h3>
            <span class="text-xs text-stone-500" x-text="`${recentProjects.length} tracked`"></span>
          </div>
          <div class="mt-3 space-y-2">
            <template x-for="project in recentProjects" :key="project.path">
              <button @click="openRecentProject(project.path)" class="block w-full rounded-xl border border-stone-800 bg-stone-950/60 px-4 py-3 text-left text-sm text-stone-200 transition hover:border-amber-400/60"
                :class="currentProject && currentProject.path === project.path ? 'border-amber-500 ring-1 ring-amber-500/40' : ''">
                <div class="flex items-center justify-between gap-2">
                  <p class="font-medium text-stone-100 truncate" x-text="project.name"></p>
                  <span x-show="currentProject && currentProject.path === project.path" class="shrink-0 rounded-full bg-amber-400/20 px-2 py-0.5 text-[10px] uppercase tracking-[0.15em] text-amber-300">open</span>
                </div>
                <p class="mt-1 break-all text-xs text-stone-500" x-text="project.path"></p>
              </button>
            </template>
            <template x-if="recentProjects.length === 0">
              <p class="rounded-xl border border-stone-800 bg-stone-950/60 px-4 py-3 text-sm text-stone-500">No recent projects yet.</p>
            </template>
          </div>
        </aside>

        <section class="space-y-6">
          <template x-if="uiSection === 'workspace'">
            <div class="space-y-6">
              <div class="flex items-center justify-between rounded-2xl border border-stone-800 bg-stone-900 p-3 shadow-2xl shadow-black/20">
                <div class="inline-flex gap-2 rounded-xl border border-stone-800 bg-stone-950/60 p-1">
                  <button
                    @click="mainView = 'grid'"
                    class="rounded-lg px-3 py-2 text-xs font-medium uppercase tracking-[0.2em] transition"
                    :class="mainView === 'grid' ? 'bg-amber-400 text-stone-950' : 'text-stone-300 hover:text-amber-200'"
                  >
                    Grid
                  </button>
                  <button
                    @click="selectedImage && (mainView = 'editor')"
                    :disabled="!selectedImage"
                    class="rounded-lg px-3 py-2 text-xs font-medium uppercase tracking-[0.2em] transition disabled:cursor-not-allowed disabled:opacity-50"
                    :class="mainView === 'editor' ? 'bg-amber-400 text-stone-950' : 'text-stone-300 hover:text-amber-200'"
                  >
                    Editor
                  </button>
                  <button
                    @click="mainView = 'llm'"
                    class="rounded-lg px-3 py-2 text-xs font-medium uppercase tracking-[0.2em] transition"
                    :class="mainView === 'llm' ? 'bg-amber-400 text-stone-950' : 'text-stone-300 hover:text-amber-200'"
                  >
                    LLM
                  </button>
                  <button
                    @click="mainView = 'batch'"
                    class="rounded-lg px-3 py-2 text-xs font-medium uppercase tracking-[0.2em] transition"
                    :class="mainView === 'batch' ? 'bg-amber-400 text-stone-950' : 'text-stone-300 hover:text-amber-200'"
                  >
                    Batch
                  </button>
                  <button
                    @click="mainView = 'notes'; refreshNotes()"
                    class="rounded-lg px-3 py-2 text-xs font-medium uppercase tracking-[0.2em] transition"
                    :class="mainView === 'notes' ? 'bg-amber-400 text-stone-950' : 'text-stone-300 hover:text-amber-200'"
                  >
                    Notes
                  </button>
                  <button
                    @click="mainView = 'import'"
                    :disabled="!currentProject"
                    class="rounded-lg px-3 py-2 text-xs font-medium uppercase tracking-[0.2em] transition disabled:cursor-not-allowed disabled:opacity-40"
                    :class="mainView === 'import' ? 'bg-amber-400 text-stone-950' : 'text-stone-300 hover:text-amber-200'"
                  >
                    Import
                  </button>
                  <button
                    @click="mainView = 'export'"
                    :disabled="!currentProject"
                    class="rounded-lg px-3 py-2 text-xs font-medium uppercase tracking-[0.2em] transition disabled:cursor-not-allowed disabled:opacity-40"
                    :class="mainView === 'export' ? 'bg-amber-400 text-stone-950' : 'text-stone-300 hover:text-amber-200'"
                  >
                    Export
                  </button>
                </div>
                <span class="text-xs text-stone-500"
                  x-show="(mainView === 'editor' && selectedImage) || (mainView === 'batch' && batchIsActive())"
                  x-text="mainView === 'editor' && selectedImage ? selectedImage.filename : mainView === 'batch' ? 'Batch job running…' : ''"
                ></span>
              </div>

              <template x-if="mainView === 'grid'">
                <section class="rounded-2xl border border-stone-800 bg-stone-900 p-5 shadow-2xl shadow-black/20">
              <template x-if="currentProject">
                <div class="mb-4 grid gap-3 rounded-xl border border-stone-800 bg-stone-950/70 px-4 py-3 text-sm text-stone-300 md:grid-cols-3">
                  <div>
                    <p class="text-xs uppercase tracking-[0.2em] text-stone-500">Images</p>
                    <p class="mt-1 text-lg font-medium text-stone-100" x-text="imageSummary.count"></p>
                  </div>
                  <div>
                    <p class="text-xs uppercase tracking-[0.2em] text-stone-500">With Captions</p>
                    <p class="mt-1 text-lg font-medium text-stone-100" x-text="imageSummary.non_empty_caption_count"></p>
                  </div>
                  <div>
                    <p class="text-xs uppercase tracking-[0.2em] text-stone-500">Blank Captions</p>
                    <p class="mt-1 text-lg font-medium text-stone-100" x-text="imageSummary.blank_caption_count"></p>
                  </div>
                </div>
              </template>
              <div class="grid grid-cols-2 gap-4 md:grid-cols-3 xl:grid-cols-4">
                <template x-for="card in gridCards" :key="card.id">
                  <button @click="selectImage(card.id, true)" class="group overflow-hidden rounded-2xl border border-stone-800 bg-stone-950 text-left transition hover:-translate-y-0.5 hover:border-amber-400/50" :class="selectedImage && selectedImage.id === card.id ? 'border-amber-400 ring-1 ring-amber-400/50' : ''">
                    <div class="aspect-square overflow-hidden bg-gradient-to-br from-stone-800 via-stone-900 to-stone-950">
                      <img :src="imageSrc(card.id)" :alt="card.label" class="h-full w-full object-cover" loading="lazy" />
                    </div>
                    <div class="space-y-2 px-3 py-3">
                      <div class="flex items-center justify-between text-xs text-stone-400">
                        <span x-text="card.label"></span>
                        <span x-text="card.status"></span>
                      </div>
                      <p class="text-sm text-stone-300" x-text="card.active_caption_preview || 'No active caption yet.'"></p>
                    </div>
                  </button>
                </template>
                <template x-if="gridCards.length === 0">
                  <p class="col-span-full rounded-xl border border-stone-800 bg-stone-950/70 px-4 py-3 text-sm text-stone-400">
                    No images loaded yet. Import a folder to populate this grid.
                  </p>
                </template>
              </div>
                </section>
              </template>

              <template x-if="mainView === 'editor'">
                <section class="rounded-2xl border border-stone-800 bg-stone-900 p-5 shadow-2xl shadow-black/20">
              <div class="mb-4 flex items-center justify-between">
                <h2 class="text-lg font-medium">Single Image Editor</h2>
                <span class="text-xs text-stone-500">Manual caption + candidate workflow</span>
              </div>
              <template x-if="selectedImage">
                <div class="space-y-4">
                  <div class="overflow-hidden rounded-2xl border border-stone-800 bg-stone-950/70">
                    <img :src="imageSrc(selectedImage.id)" :alt="selectedImage.filename" class="h-auto w-full object-contain" />
                  </div>
                  <div class="flex flex-wrap items-center justify-between gap-3 rounded-xl border border-stone-800 bg-stone-950/70 px-4 py-3 text-sm text-stone-300">
                    <div>
                      <p class="font-medium text-stone-100" x-text="selectedImage.filename"></p>
                      <p class="text-xs text-stone-500" x-text="`${selectedImage.width || '?'} x ${selectedImage.height || '?'} px`"></p>

                    <button @click="toggleIncluded()" :disabled="isSubmitting" class="rounded-xl border border-stone-700 px-3 py-2 text-xs uppercase tracking-[0.2em] text-stone-200 hover:border-amber-400 hover:text-amber-200 disabled:cursor-not-allowed disabled:opacity-60" :class="selectedImage.included ? 'border-emerald-700 text-emerald-300' : 'border-red-700 text-red-300'">
                      <span x-text="selectedImage.included ? 'Included' : 'Excluded'"></span>
                    </button>

                      <label class="block text-xs uppercase tracking-[0.2em] text-stone-500">

                      <label class="block text-xs uppercase tracking-[0.2em] text-stone-500">

                            <option :value="modelInfo.name" x-text="modelOptionLabel(modelInfo)"></option>
                          </template>
                        </select>
                      </label>
                    </div>

                    <div class="mt-3 rounded-xl border border-stone-800 bg-stone-900 px-3 py-2">

                          <option :value="String(preset.id)" x-text="`${preset.name} (${preset.backend}/${preset.model_name}, ${preset.caption_mode_strategy || 'auto'})`"></option>
                        </template>
                      </select>
                    </label>

                    <label class="mt-3 block text-xs uppercase tracking-[0.2em] text-stone-500">
                      Extra Instructions
                      <textarea x-model="llm.extraInstructions" class="mt-2 min-h-20 w-full rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-sm text-stone-200 focus:border-amber-400 focus:outline-none" placeholder="Optional style guidance for generation"></textarea>
                    </label>

                    <!-- Context & Tools accordion -->
                    <div class="mt-3 rounded-xl border border-stone-800 bg-stone-900">
                      <button
                        type="button"
                        @click="llm.tools.showPanel = !llm.tools.showPanel"

                        <span>Context &amp; Tools</span>
                        <span x-text="llm.tools.showPanel ? '▲' : '▼'" class="text-stone-500"></span>
                      </button>
                      <div x-show="llm.tools.showPanel" class="border-t border-stone-800 px-3 pb-3 pt-2 space-y-3">
                        <p class="text-xs text-stone-500">Context URLs and files are injected into every generation. Tool checkboxes require a tool-capable model (🔨).</p>
                        <div class="space-y-2">
                          <label class="field-checkbox">
                            <input type="checkbox" x-model="llm.tools.webSearch" class="rounded border-stone-700 bg-stone-900 text-amber-400 focus:ring-amber-400" />

                          </label>
                          <label class="field-checkbox">
                            <input type="checkbox" x-model="llm.tools.webFetch" class="rounded border-stone-700 bg-stone-900 text-amber-400 focus:ring-amber-400" />
                            Web fetch (model can read URLs from search results)
                          </label>
                        </div>
                        <label class="block text-xs text-stone-400">
                          Reference URL (pre-fetched before generation)
                          <input type="url" x-model="llm.tools.contextUrl" placeholder="https://…" class="mt-1 w-full rounded-xl border border-stone-700 bg-stone-950 px-3 py-2 text-sm text-stone-200 focus:border-amber-400 focus:outline-none" />
                        </label>
                        <label class="block text-xs text-stone-400">
                          Reference file path (pre-read before generation)
                          <input type="text" x-model="llm.tools.contextFile" placeholder="/path/to/notes.txt" class="mt-1 w-full rounded-xl border border-stone-700 bg-stone-950 px-3 py-2 text-sm text-stone-200 focus:border-amber-400 focus:outline-none" />
                        </label>
                        <div class="space-y-2">
                          <p class="text-xs text-stone-500">Notes context (injected from the Notes tab)</p>
                          <label class="field-checkbox">
                            <input type="checkbox" x-model="llm.tools.includeProjectNotes" class="rounded border-stone-700 bg-stone-900 text-amber-400 focus:ring-amber-400" />
                            Include all active project notes
                          </label>
                          <label class="field-checkbox">
                            <input type="checkbox" x-model="llm.tools.includeGlobalNotes" class="rounded border-stone-700 bg-stone-900 text-amber-400 focus:ring-amber-400" />
                            Include all active global notes
                          </label>
                        </div>
                      </div>
                    </div>

                    <div class="mt-3 flex flex-wrap items-center gap-3">
                      <label class="field-checkbox">
                        <input type="checkbox" x-model="llm.makeActive" class="rounded border-stone-700 bg-stone-900 text-amber-400 focus:ring-amber-400" />

                      </label>
                      <span class="text-xs text-stone-500" x-text="`Timeout: ${settings.llmTimeoutSeconds}s`"></span>
                    </div>
                    <div class="mt-3 flex flex-wrap gap-3">

                      >
                        <svg x-show="isSubmitting" class="h-4 w-4 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        <span x-text="isSubmitting ? 'Generating…' : 'Generate Manual Caption'"></span>
                      </button>
                      <button
                        @click="generateCaptionWithPreset()"
                        :disabled="isSubmitting || !llm.selectedPresetId"
                        class="inline-flex items-center gap-2 rounded-xl border border-stone-700 px-4 py-2 text-sm font-medium text-stone-200 transition hover:border-amber-400 hover:text-amber-200 disabled:cursor-not-allowed disabled:opacity-60"
                      >
                        <svg x-show="isSubmitting" class="h-4 w-4 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        <span x-text="isSubmitting ? 'Generating…' : 'Generate With Preset'"></span>
                      </button>
                      <button
                        @click="generateCaptionWithTools()"
                        :disabled="isSubmitting || !llm.backend || !llm.model"
                        class="inline-flex items-center gap-2 rounded-xl border border-amber-700 px-4 py-2 text-sm font-medium text-amber-300 transition hover:border-amber-400 hover:text-amber-200 disabled:cursor-not-allowed disabled:opacity-60"
                        title="Generate using context injection and/or tool calling"
                      >
                        <svg x-show="isSubmitting" class="h-4 w-4 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        <span x-text="isSubmitting ? 'Generating…' : '🔨 Generate with Tools'"></span>
                      </button>
                    </div>
                    <!-- Inline status/error — visible without scrolling to the sidebar -->
                    <template x-if="statusMessage && mainView === 'editor'">
                      <p class="mt-3 rounded-xl border border-emerald-900 bg-emerald-950/40 px-3 py-2 text-sm text-emerald-200" x-text="statusMessage"></p>
                    </template>
                    <template x-if="errorMessage && mainView === 'editor'">
                      <p class="mt-3 rounded-xl border border-red-900 bg-red-950/40 px-3 py-2 text-sm text-red-200" x-text="errorMessage"></p>
                    </template>
                    <template x-if="llm.backends.length === 0">
                      <p class="mt-3 rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-xs text-stone-500">
                        No LLM backend is reachable yet. Start Ollama or LM Studio, then refresh models.
                      </p>
                    </template>
                  </div>

                  <div>
                    <label class="block text-sm font-medium text-stone-300">Active Caption</label>
                    <textarea
                      x-model="editorCaptionText"
                      class="mt-2 min-h-40 w-full rounded-2xl border border-stone-800 bg-stone-950 px-4 py-3 text-sm text-stone-200 outline-none ring-0 placeholder:text-stone-500 focus:border-amber-400"
                      placeholder="Edit the active caption here."
                    ></textarea>
                    <div class="mt-3 flex gap-3">
                      <button @click="saveActiveCaption()" :disabled="isSubmitting" class="rounded-xl bg-amber-400 px-4 py-2 text-sm font-medium text-stone-950 transition hover:bg-amber-300 disabled:cursor-not-allowed disabled:opacity-60">
                        Save Active Caption
                      </button>
                    </div>
                  </div>

                  <div class="rounded-2xl border border-stone-800 bg-stone-950/70 p-4">
                    <p class="text-sm font-medium text-stone-200">Caption Candidates</p>

                      <template x-for="caption in selectedImage.captions" :key="caption.id">
                        <div class="w-full rounded-xl border px-3 py-2 text-left text-sm transition" :class="caption.is_active ? 'border-amber-500 bg-amber-500/10 text-amber-100' : 'border-stone-800 bg-stone-900 text-stone-300'">
                          <div class="mb-1 flex items-center justify-between text-[10px] uppercase tracking-[0.2em]">
                            <span x-text="caption.source"></span>
                            <span x-text="caption.is_active ? 'active' : 'candidate'"></span>
                          </div>
                          <template x-if="editingCaptionId !== caption.id">
                            <p class="line-clamp-3" x-text="caption.text || '(empty caption)'"></p>
                          </template>
                          <template x-if="editingCaptionId === caption.id">
                            <textarea x-model="editingCaptionText" class="min-h-20 w-full rounded-lg border border-stone-700 bg-stone-950 px-2 py-1 text-sm text-stone-200 focus:border-amber-400 focus:outline-none" placeholder="Edit caption text"></textarea>
                          </template>
                          <div class="mt-2 flex flex-wrap gap-2">
                            <button @click="setActiveCaption(caption.id)" :disabled="isSubmitting || caption.is_active" class="rounded-lg border border-stone-700 px-2 py-1 text-xs text-stone-200 hover:border-amber-400 hover:text-amber-200 disabled:cursor-not-allowed disabled:opacity-60">
                              Set Active
                            </button>
                            <button @click="startEditCaption(caption)" :disabled="isSubmitting" class="rounded-lg border border-stone-700 px-2 py-1 text-xs text-stone-200 hover:border-amber-400 hover:text-amber-200 disabled:cursor-not-allowed disabled:opacity-60">
                              Edit
                            </button>
                            <button @click="deleteCaption(caption)" :disabled="isSubmitting" class="rounded-lg border border-red-700 px-2 py-1 text-xs text-red-300 hover:border-red-500 hover:text-red-200 disabled:cursor-not-allowed disabled:opacity-60">
                              Delete
                            </button>
                          </div>
                          <template x-if="editingCaptionId === caption.id">
                            <div class="mt-2 flex flex-wrap gap-2">
                              <button @click="saveEditedCaption(caption)" :disabled="isSubmitting" class="rounded-lg border border-emerald-700 px-2 py-1 text-xs text-emerald-300 hover:border-emerald-500 hover:text-emerald-200 disabled:cursor-not-allowed disabled:opacity-60">
                                Save Edit
                              </button>
                              <button @click="cancelEditCaption()" :disabled="isSubmitting" class="rounded-lg border border-stone-700 px-2 py-1 text-xs text-stone-300 hover:border-stone-500 hover:text-stone-100 disabled:cursor-not-allowed disabled:opacity-60">
                                Cancel Edit
                              </button>
                            </div>
                          </template>
                        </div>
                      </template>
                      <template x-if="selectedImage && selectedImage.captions.length === 0">
                        <p class="rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-sm text-stone-500">No captions yet for this image.</p>
                      </template>
                    </div>

                    <div class="mt-4 border-t border-stone-800 pt-4">
                      <label class="block text-xs uppercase tracking-[0.2em] text-stone-500">Add Caption Candidate</label>
                      <textarea x-model="newCaptionText" class="mt-2 min-h-24 w-full rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-sm text-stone-200 focus:border-amber-400 focus:outline-none" placeholder="Write a new caption candidate..."></textarea>

                        <button @click="addCaptionCandidate(true)" :disabled="isSubmitting" class="rounded-xl border border-stone-700 px-3 py-2 text-sm text-stone-200 hover:border-amber-400 hover:text-amber-200 disabled:cursor-not-allowed disabled:opacity-60">
                          Add And Activate
                        </button>
                        <button @click="addCaptionCandidate(false)" :disabled="isSubmitting" class="rounded-xl border border-stone-700 px-3 py-2 text-sm text-stone-200 hover:border-amber-400 hover:text-amber-200 disabled:cursor-not-allowed disabled:opacity-60">
                          Add As Candidate
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              </template>
              <template x-if="!selectedImage">
                <div class="rounded-2xl border border-dashed border-stone-700 bg-stone-950/70 px-4 py-8 text-center text-sm text-stone-500">

                </div>
              </template>
                </section>
              </template>
            </div>
          </template>

          <template x-if="uiSection === 'workspace' && mainView === 'notes'">

                <h2 class="text-lg font-medium">Notes</h2>
                <button @click="refreshNotes()" class="rounded-xl border border-stone-700 px-3 py-2 text-xs uppercase tracking-[0.2em] text-stone-300 hover:border-amber-400 hover:text-amber-200">

                      <button
                        @click="notes.scope = 'project'; onNotesScopeChanged()"
                        class="rounded-lg px-3 py-2 text-xs font-medium uppercase tracking-[0.2em] transition"
                        :class="notes.scope === 'project' ? 'bg-amber-400 text-stone-950' : 'text-stone-300 hover:text-amber-200'"
                      >
                        Project Notes
                      </button>
                      <button
                        @click="notes.scope = 'global'; onNotesScopeChanged()"
                        class="rounded-lg px-3 py-2 text-xs font-medium uppercase tracking-[0.2em] transition"
                        :class="notes.scope === 'global' ? 'bg-amber-400 text-stone-950' : 'text-stone-300 hover:text-amber-200'"
                      >
                        Global Notes
                      </button>
                    </div>
                    <label class="field-checkbox">
                      <input type="checkbox" x-model="notes.includeArchived" @change="onNotesArchivedFilterChanged()" class="rounded border-stone-700 bg-stone-900 text-amber-400 focus:ring-amber-400" />

                    </label>
                  </div>
                  <template x-if="notes.scope === 'project' && !currentProject">
                    <p class="mt-3 rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-xs text-stone-500">Open a project to view project notes. Global notes remain available.</p>
                  </template>

                      <p class="text-xs uppercase tracking-[0.2em] text-stone-500">Notes List</p>
                      <button @click="newNoteDraft()" class="rounded-lg border border-stone-700 px-2 py-1 text-[10px] uppercase tracking-[0.2em] text-stone-300 hover:border-amber-400 hover:text-amber-200">

                        <button @click="selectNote(note)" class="block w-full rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-left text-sm text-stone-200 hover:border-amber-400/60" :class="notes.selectedNoteId === note.id ? 'border-amber-500 ring-1 ring-amber-500/50' : ''">
                          <div class="flex items-center justify-between gap-2">
                            <p class="truncate font-medium text-stone-100" x-text="note.title || '(untitled note)'"></p>
                            <span x-show="note.is_archived" class="rounded-full border border-stone-700 px-2 py-0.5 text-[10px] uppercase tracking-[0.15em] text-stone-400">archived</span>
                          </div>
                          <p class="mt-1 text-xs text-stone-500" x-text="`${note.format}${note.tags ? ` • ${note.tags}` : ''}`"></p>
                        </button>
                      </template>
                      <template x-if="notesActiveItems().length === 0">
                        <p class="rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-sm text-stone-500">No notes in this scope yet.</p>

                      <label class="block text-xs uppercase tracking-[0.2em] text-stone-500">

                        <select x-model="notes.editor.format" class="mt-2 w-full rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 pr-8 text-sm text-stone-200 focus:border-amber-400 focus:outline-none">

                          <option value="text">Text</option>
                        </select>
                      </label>
                      <label class="block text-xs uppercase tracking-[0.2em] text-stone-500">

                      </label>
                    </div>
                    <label class="mt-3 block text-xs uppercase tracking-[0.2em] text-stone-500">
                      Content
                      <textarea x-model="notes.editor.content" class="mt-2 min-h-56 w-full rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-sm text-stone-200 focus:border-amber-400 focus:outline-none" placeholder="Write note content (text or markdown)"></textarea>
                    </label>
                    <label class="mt-3 field-checkbox">

                    <div class="mt-4 flex flex-wrap gap-3">

                        Save Note
                      </button>

                        Delete Note
                      </button>
                      <button @click="newNoteDraft()" :disabled="isSubmitting" class="rounded-xl border border-stone-700 px-4 py-2 text-sm font-medium text-stone-200 transition hover:border-amber-400 hover:text-amber-200 disabled:cursor-not-allowed disabled:opacity-60">
                        New Draft
                      </button>
                    </div>
                  </div>

                    <label class="block text-xs uppercase tracking-[0.2em] text-stone-500">
                      Model

                        </select>
                      </label>
                      <label class="block text-xs uppercase tracking-[0.2em] text-stone-500">
                        Model
                        <select x-model="llm.model" :disabled="batchIsActive()" class="mt-2 w-full rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 pr-8 text-sm text-stone-200 focus:border-amber-400 focus:outline-none disabled:opacity-60">
                          <template x-for="modelInfo in availableModelsForBackend(llm.backend)" :key="modelInfo.name">
                            <option :value="modelInfo.name" x-text="modelOptionLabel(modelInfo)"></option>
                          </template>
                        </select>
                      </label>
                    </div>

                    <label class="block text-xs uppercase tracking-[0.2em] text-stone-500">
                      Extra Instructions
                      <textarea x-model="llm.extraInstructions" :disabled="batchIsActive()" class="mt-2 min-h-20 w-full rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-sm text-stone-200 focus:border-amber-400 focus:outline-none disabled:opacity-60" placeholder="Optional style guidance for batch generation"></textarea>
                    </label>
                  </div>

                  <div class="mt-4 flex flex-wrap items-center gap-3">
                    <label class="field-checkbox">
                      <input type="checkbox" x-model="llm.makeActive" :disabled="batchIsActive()" class="rounded border-stone-700 bg-stone-900 text-amber-400 focus:ring-amber-400 disabled:opacity-60" />
                      Set generated caption as active
                    </label>
                    <span class="text-xs text-stone-500" x-text="`Timeout: ${settings.llmTimeoutSeconds}s`"></span>
                    <button @click="startBatchGeneration()" :disabled="batchIsActive() || isSubmitting || !currentProject" class="rounded-xl bg-amber-400 px-4 py-2 text-sm font-medium text-stone-950 transition hover:bg-amber-300 disabled:cursor-not-allowed disabled:opacity-60">
                      Start Batch
                    </button>
                    <button @click="pauseBatchGeneration()" :disabled="!batchCanPause()" class="rounded-xl border border-stone-700 px-4 py-2 text-sm font-medium text-stone-200 transition hover:border-amber-400 hover:text-amber-200 disabled:cursor-not-allowed disabled:opacity-60">
                      Pause
                    </button>
                    <button @click="resumeBatchGeneration()" :disabled="!batchCanResume()" class="rounded-xl border border-stone-700 px-4 py-2 text-sm font-medium text-stone-200 transition hover:border-amber-400 hover:text-amber-200 disabled:cursor-not-allowed disabled:opacity-60">
                      Resume
                    </button>
                    <button @click="cancelBatchGeneration()" :disabled="!batchCanCancel()" class="rounded-xl border border-stone-700 px-4 py-2 text-sm font-medium text-stone-200 transition hover:border-amber-400 hover:text-amber-200 disabled:cursor-not-allowed disabled:opacity-60">
                      Cancel
                    </button>
                  </div>
                </div>

                <div class="rounded-xl border border-stone-800 bg-stone-950/70 p-4">
                  <div class="mb-2 flex items-center justify-between text-sm text-stone-300">
                    <span>Progress</span>
                    <span x-text="`${batch.completed} / ${batch.total} (${batchProgressPercent()}%)`"></span>
                  </div>
                  <div class="h-3 overflow-hidden rounded-full bg-stone-800">
                    <div class="h-full bg-amber-400 transition-all" :style="`width: ${batchProgressPercent()}%`"></div>
                  </div>
                  <div class="mt-2 flex flex-wrap gap-4 text-xs text-stone-500">
                    <span x-text="`Succeeded: ${batch.succeeded}`"></span>
                    <span x-text="`Failed: ${batch.failed}`"></span>
                    <span x-show="batch.status === 'running'" class="text-amber-300">Running...</span>
                    <span x-show="batch.status === 'queued'" class="text-amber-300">Queued...</span>
                    <span x-show="batch.status === 'paused'" class="text-amber-300">Paused</span>
                    <span x-show="batch.status === 'failed'" class="text-red-300">Failed (resume available)</span>
                  </div>
                </div>

                <div class="grid gap-4 lg:grid-cols-[320px_minmax(0,1fr)]">
                  <div class="rounded-xl border border-stone-800 bg-stone-950/70 p-4">
                    <p class="mb-2 text-xs uppercase tracking-[0.2em] text-stone-500">Current Image</p>
                    <template x-if="batch.currentImageId">
                      <div class="space-y-2">
                        <div class="aspect-square overflow-hidden rounded-xl border border-stone-800 bg-stone-900">
                          <img :src="batchCurrentImageSrc()" :alt="batch.currentFilename" class="h-full w-full object-cover" />
                        </div>
                        <p class="break-all text-xs text-stone-400" x-text="batch.currentFilename"></p>
                      </div>
                    </template>
                    <template x-if="!batch.currentImageId">
                      <p class="text-sm text-stone-500">No image processed yet.</p>
                    </template>
                  </div>

                  <div class="rounded-xl border border-stone-800 bg-stone-950/70 p-4">
                    <p class="mb-2 text-xs uppercase tracking-[0.2em] text-stone-500">Latest Generated Text</p>
                    <div class="min-h-40 rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-sm text-stone-200">
                      <p x-text="batch.currentGeneratedText || 'No generated text yet.'"></p>
                    </div>
                    <template x-if="batch.lastError">
                      <p class="mt-2 text-xs text-red-300" x-text="`Last error: ${batch.lastError}`"></p>
                    </template>
                  </div>
                </div>

                <div class="grid gap-4 lg:grid-cols-[320px_minmax(0,1fr)]">
                  <div class="rounded-xl border border-stone-800 bg-stone-950/70 p-4">
                    <div class="mb-2 flex items-center justify-between">
                      <p class="text-xs uppercase tracking-[0.2em] text-stone-500">Job History</p>
                      <button @click="loadBatchHistory()" class="rounded-lg border border-stone-700 px-2 py-1 text-[10px] uppercase tracking-[0.2em] text-stone-300 hover:border-amber-400 hover:text-amber-200">
                        Refresh
                      </button>
                    </div>
                    <label class="mb-2 block text-[10px] uppercase tracking-[0.2em] text-stone-500">
                      Filter
                      <select x-model="batch.historyStatusFilter" class="mt-1 w-full rounded-lg border border-stone-800 bg-stone-900 px-2 py-1 pr-8 text-xs text-stone-200 focus:border-amber-400 focus:outline-none">
                        <option value="all">All statuses</option>
                        <option value="queued">Queued</option>
                        <option value="running">Running</option>
                        <option value="paused">Paused</option>
                        <option value="failed">Failed</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                      </select>
                    </label>
                    <div class="max-h-56 space-y-2 overflow-auto pr-1">
                      <template x-for="job in filteredBatchHistory()" :key="job.id">
                        <button @click="selectBatchJob(job.id)" class="block w-full rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-left text-xs text-stone-200 hover:border-amber-400/60" :class="batch.jobId === job.id ? 'border-amber-500 ring-1 ring-amber-500/40' : ''">
                          <div class="flex items-center justify-between gap-2">
                            <span class="truncate" x-text="job.id"></span>
                            <span class="text-stone-400" x-text="job.status"></span>
                          </div>
                          <p class="mt-1 text-stone-500" x-text="`${job.completed}/${job.total} | ok ${job.succeeded} | fail ${job.failed}`"></p>
                        </button>
                      </template>
                      <template x-if="filteredBatchHistory().length === 0">
                        <p class="rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-sm text-stone-500">No batch jobs yet.</p>
                      </template>
                    </div>
                  </div>

                  <div class="rounded-xl border border-stone-800 bg-stone-950/70 p-4">
                    <div class="mb-2 flex items-center justify-between gap-3">
                      <p class="text-xs uppercase tracking-[0.2em] text-stone-500">Per-Image Results</p>
                      <a :href="batchResultsExportUrl()" x-show="batch.jobId" class="rounded-lg border border-stone-700 px-2 py-1 text-[10px] uppercase tracking-[0.2em] text-stone-300 hover:border-amber-400 hover:text-amber-200">
                        Export CSV
                      </a>
                    </div>
                    <div class="max-h-64 overflow-auto rounded-xl border border-stone-800">
                      <table class="w-full text-left text-xs text-stone-300">
                        <thead class="bg-stone-900 text-stone-500">
                          <tr>
                            <th class="px-3 py-2">Image</th>
                            <th class="px-3 py-2">Status</th>
                            <th class="px-3 py-2">Attempts</th>
                            <th class="px-3 py-2">Generated Text</th>
                            <th class="px-3 py-2">Error</th>
                            <th class="px-3 py-2">Started</th>
                            <th class="px-3 py-2">Finished</th>
                          </tr>
                        </thead>
                        <tbody>
                          <template x-for="result in batch.results" :key="`${result.job_id}-${result.image_id}`">
                            <tr class="border-t border-stone-800">
                              <td class="px-3 py-2" x-text="result.filename"></td>
                              <td class="px-3 py-2" x-text="result.status"></td>
                              <td class="px-3 py-2" x-text="result.attempts"></td>
                              <td class="max-w-72 px-3 py-2 text-stone-400" :title="result.generated_text || ''" x-text="batchResultTextPreview(result.generated_text)"></td>
                              <td class="px-3 py-2 break-all" x-text="result.error || '-' "></td>
                              <td class="whitespace-nowrap px-3 py-2 text-stone-400" x-text="formatBatchTimestamp(result.started_at)"></td>
                              <td class="whitespace-nowrap px-3 py-2 text-stone-400" x-text="formatBatchTimestamp(result.finished_at)"></td>
                            </tr>
                          </template>
                          <template x-if="batch.results.length === 0">
                            <tr>
                              <td colspan="7" class="px-3 py-3 text-stone-500">No results for selected job.</td>
                            </tr>
                          </template>
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              </div>
            </section>
          </template>

          <template x-if="uiSection === 'settings'">
            <section class="rounded-2xl border border-stone-800 bg-stone-900 p-5 shadow-2xl shadow-black/20">
              <div class="mb-4 flex items-center justify-between">
                <h2 class="text-lg font-medium">Settings</h2>
                <span class="text-xs text-stone-500">Workspace preferences</span>
              </div>

              <div class="space-y-3">

                <!-- LLM Defaults -->
                <div class="rounded-2xl border border-stone-800 bg-stone-950/60 p-4">
                  <p class="mb-3 text-xs font-semibold uppercase tracking-[0.2em] text-stone-400">LLM Defaults</p>
                  <div class="space-y-3">
                    <label class="block text-xs uppercase tracking-[0.2em] text-stone-500">
                      Generation Timeout (seconds)
                      <input
                        type="number"
                        min="10"
                        max="900"
                        step="1"
                        x-model.number="settings.llmTimeoutSeconds"
                        class="mt-2 w-full rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-sm text-stone-200 focus:border-amber-400 focus:outline-none"
                      />
                    </label>
                    <p class="text-xs text-stone-500">Used for caption generation requests to Ollama and LM Studio. Larger models may need higher values.</p>

                    <label class="field-checkbox">
                      <input type="checkbox" x-model="settings.usePresetByDefault" class="rounded border-stone-700 bg-stone-900 text-amber-400 focus:ring-amber-400" />
                      Use preset by default for generation
                    </label>

                    <label class="block text-xs uppercase tracking-[0.2em] text-stone-500">
                      Default Preset
                      <select x-model="settings.defaultPresetId" :disabled="llm.presets.length === 0" class="mt-2 w-full rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 pr-8 text-sm text-stone-200 focus:border-amber-400 focus:outline-none disabled:opacity-50">
                        <option value="">No default preset</option>
                        <template x-for="preset in llm.presets" :key="preset.id">
                          <option :value="String(preset.id)" x-text="`${preset.name} (${preset.backend}/${preset.model_name}, ${preset.caption_mode_strategy || 'auto'})${modelCapabilityLabel(preset.backend, preset.model_name) ? ` ${modelCapabilityLabel(preset.backend, preset.model_name)}` : ''}`"></option>
                        </template>
                      </select>
                    </label>
                    <template x-if="llm.presets.length === 0">
                      <p class="text-xs text-stone-500">No presets available yet. Create one in the LLM tab to use preset defaults.</p>
                    </template>
                  </div>
                </div>

                <!-- Ollama -->
                <div class="rounded-2xl border border-stone-800 bg-stone-950/60 p-4">
                  <p class="mb-3 text-xs font-semibold uppercase tracking-[0.2em] text-stone-400">Ollama</p>
                  <div class="space-y-3">
                    <div class="block text-xs uppercase tracking-[0.2em] text-stone-500">
                      Base URL
                      <div class="mt-2 flex items-center gap-2">
                        <input x-model="settings.ollamaBaseUrl" @input="connectionTest.ollama = null" class="min-w-0 flex-1 rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-sm text-stone-200 focus:border-amber-400 focus:outline-none" placeholder="http://127.0.0.1:11434" />
                        <button
                          @click="testConnection('ollama')"
                          :disabled="connectionTest.ollamaTesting"
                          class="shrink-0 rounded-lg border border-stone-700 px-2 py-2 text-[10px] uppercase tracking-[0.2em] text-stone-300 hover:border-amber-400 hover:text-amber-200 disabled:opacity-50"
                          x-text="connectionTest.ollamaTesting ? 'Testing…' : 'Test'"
                        ></button>
                      </div>
                      <template x-if="connectionTest.ollama !== null">
                        <p
                          class="mt-1 text-[11px]"
                          :class="connectionTest.ollama.ok ? 'text-emerald-400' : 'text-red-400'"
                          x-text="connectionTest.ollama.message"
                        ></p>
                      </template>
                    </div>
                    <label class="block text-xs uppercase tracking-[0.2em] text-stone-500">
                      Timeout Override (optional)
                      <input type="number" min="10" max="900" step="1" x-model="settings.ollamaTimeoutSeconds" class="mt-2 w-full rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-sm text-stone-200 focus:border-amber-400 focus:outline-none" placeholder="Uses global timeout when blank" />
                    </label>
                    <label class="block text-xs uppercase tracking-[0.2em] text-stone-500">
                      Context Window Override (optional)
                      <input type="number" min="256" max="262144" step="1" x-model="settings.ollamaNumCtx" class="mt-2 w-full rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-sm text-stone-200 focus:border-amber-400 focus:outline-none" placeholder="Uses model default when blank" />
                    </label>
                  </div>
                </div>

                <!-- LM Studio -->
                <div class="rounded-2xl border border-stone-800 bg-stone-950/60 p-4">
                  <p class="mb-3 text-xs font-semibold uppercase tracking-[0.2em] text-stone-400">LM Studio</p>
                  <div class="space-y-3">
                    <div class="block text-xs uppercase tracking-[0.2em] text-stone-500">
                      Base URL
                      <div class="mt-2 flex items-center gap-2">
                        <input x-model="settings.lmstudioBaseUrl" @input="connectionTest.lmstudio = null" class="min-w-0 flex-1 rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-sm text-stone-200 focus:border-amber-400 focus:outline-none" placeholder="http://127.0.0.1:1234" />
                        <button
                          @click="testConnection('lmstudio')"
                          :disabled="connectionTest.lmstudioTesting"
                          class="shrink-0 rounded-lg border border-stone-700 px-2 py-2 text-[10px] uppercase tracking-[0.2em] text-stone-300 hover:border-amber-400 hover:text-amber-200 disabled:opacity-50"
                          x-text="connectionTest.lmstudioTesting ? 'Testing…' : 'Test'"
                        ></button>
                      </div>
                      <template x-if="connectionTest.lmstudio !== null">
                        <p
                          class="mt-1 text-[11px]"
                          :class="connectionTest.lmstudio.ok ? 'text-emerald-400' : 'text-red-400'"
                          x-text="connectionTest.lmstudio.message"
                        ></p>
                      </template>
                    </div>
                    <label class="block text-xs uppercase tracking-[0.2em] text-stone-500">
                      Timeout Override (optional)
                      <input type="number" min="10" max="900" step="1" x-model="settings.lmstudioTimeoutSeconds" class="mt-2 w-full rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-sm text-stone-200 focus:border-amber-400 focus:outline-none" placeholder="Uses global timeout when blank" />
                    </label>
                    <label class="block text-xs uppercase tracking-[0.2em] text-stone-500">
                      Context Window Override (optional)
                      <input type="number" min="256" max="262144" step="1" x-model="settings.lmstudioNumCtx" class="mt-2 w-full rounded-xl border border-stone-800 bg-stone-900 px-3 py-2 text-sm text-stone-200 focus:border-amber-400 focus:outline-none" placeholder="Used when backend supports num_ctx" />
                    </label>
                  </div>
                </div>

                <!-- Project Behaviour -->
                <div class="rounded-2xl border border-stone-800 bg-stone-950/60 p-4">
                  <p class="mb-3 text-xs font-semibold uppercase tracking-[0.2em] text-stone-400">Project Behaviour</p>
                  <label class="field-checkbox">
                    <input type="checkbox" x-model="settings.reopenLastProjectOnStartup" class="rounded border-stone-700 bg-stone-900 text-amber-400 focus:ring-amber-400" />
                    Reopen last project on startup
                  </label>
                </div>

                <!-- Debug (collapsible) -->
                <div class="rounded-2xl border border-stone-800 bg-stone-950/60 p-4">
                  <button
                    @click="settings.showDebugSection = !settings.showDebugSection"
                    class="flex w-full items-center justify-between text-xs font-semibold uppercase tracking-[0.2em] text-stone-400 hover:text-stone-200"
                  >
                    <span>Debug</span>
                    <span x-text="settings.showDebugSection ? '▲' : '▼'" class="text-[10px]"></span>
                  </button>
                  <div x-show="settings.showDebugSection" class="mt-3 space-y-3">

                <div class="rounded-xl border border-emerald-700/50 bg-emerald-950/30 p-3">
                  <div class="mb-3 flex items-center justify-between">
                    <p class="text-xs uppercase tracking-[0.2em] text-emerald-400">Semantic Search (RAG)</p>
                    <span
                      class="rounded-full px-2 py-1 text-[10px]"
                      :class="rag.enabled ? 'bg-emerald-400/20 text-emerald-300' : 'bg-stone-700/40 text-stone-300'"
                      x-text="rag.enabled ? 'Available' : 'Unavailable'"
                    ></span>
                  </div>

                  <template x-if="rag.enabled && currentProject">
                    <div>
                      <button @click="rebuildEmbeddings()" :disabled="rag.isRebuildingEmbeddings" class="w-full rounded-lg border border-emerald-600 bg-emerald-900/40 px-3 py-2 text-xs font-medium uppercase tracking-[0.2em] text-emerald-300 hover:border-emerald-400 hover:bg-emerald-900/60 disabled:opacity-50">
                        <span x-text="rag.isRebuildingEmbeddings ? 'Rebuilding...' : 'Rebuild Embeddings'"></span>
                      </button>
                      <template x-if="rag.embeddingsStatus">
                        <p class="mt-2 text-xs text-emerald-300" x-text="rag.embeddingsStatus"></p>
                      </template>
                    </div>
                  </template>

                  <template x-if="rag.enabled && !currentProject">
                    <p class="text-xs text-stone-500">Open a project to rebuild embeddings.</p>
                  </template>

                  <template x-if="!rag.enabled">
                    <p class="text-xs text-stone-400">
                      Semantic search is currently unavailable. Install optional dependency
                      <span class="font-mono text-stone-300">chromadb</span>
                      in your active Python environment and restart the app.
                    </p>
                  </template>
                </div>

                    <div class="rounded-xl border border-stone-700 bg-stone-900/80 p-3 text-xs text-stone-300">
                      <div class="mb-2 flex items-center justify-between">
                        <p class="uppercase tracking-[0.2em] text-stone-500">Backend Diagnostics</p>
                        <button @click="loadLLMBackends()" class="rounded-lg border border-stone-700 px-2 py-1 text-[10px] uppercase tracking-[0.2em] text-stone-300 hover:border-amber-400 hover:text-amber-200">
                          Refresh
                        </button>
                      </div>
                      <div class="space-y-2">
                        <template x-for="backend in llm.backends" :key="backend.name">
                          <div class="rounded-lg border border-stone-800 bg-stone-950/70 px-3 py-2">
                            <div class="flex items-center justify-between gap-3">
                              <p class="font-medium text-stone-100" x-text="backend.name"></p>
                              <p class="text-stone-400" x-text="backend.available ? 'online' : 'offline'"></p>
                            </div>
                            <p class="mt-1 text-stone-500" x-text="`models: ${backend.models.length}, vision: ${backend.models.filter((model) => model.vision_capable).length}`"></p>
                            <template x-if="backend.error">
                              <p class="mt-1 break-all text-red-300" x-text="backend.error"></p>
                            </template>
                          </div>
                        </template>
                      </div>
                    </div>

                  </div><!-- end debug content -->
                </div><!-- end debug section -->

                <div class="flex flex-wrap gap-3">
                  <button @click="saveSettings()" class="rounded-xl bg-amber-400 px-4 py-2 text-sm font-medium text-stone-950 transition hover:bg-amber-300">
                    Save Settings
                  </button>
                  <button @click="openWorkspace()" class="rounded-xl border border-stone-700 px-4 py-2 text-sm font-medium text-stone-200 transition hover:border-amber-400 hover:text-amber-200">
                    Back To Workspace
                  </button>
                </div>
              </div>
            </section>
          </template>
        </section>
      </main>
    </div>
  </body>
</html>
